<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Project</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="home-page">
    <header class="header">
      <div class="header-left">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/b/b1/CNN.svg"
          alt="Logo"
          class="logo-image"
        />
      </div>
      <nav class="nav">
        <a href="#">Politics</a>
        <a href="#">Business</a>
        <a href="#">Entertainment</a>
      </nav>
      <div class="header-right">
        <img
          src="https://www.iconpacks.net/icons/2/free-search-icon-2903-thumb.png"
          alt="search icon"
          class="search-icon"
        />
        <button class="liveButton">LIVE</button>
        <img
          src="images/profileIcon.png"
          alt="user profile icon"
          class="user-profile-icon"
        />
      </div>
    </header>

  <main class="content">
    <h1>Welcome to our politics archives!</h1>
    <p>This is a simple responsive layout.</p>
  </main>

</html>
